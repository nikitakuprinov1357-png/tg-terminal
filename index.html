<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade Guard PRO v5.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --accent: #f0b90b; --green: #02d1a0; --red: #f6465d; --text: #eaecef; --border: #2b3139; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 5px; }
        .balance-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .balance-val { font-size: 26px; font-weight: bold; color: var(--accent); }

        .signal-box { background: #1a1d23; border: 1px solid var(--accent); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .signal-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .sig-buy { background: var(--green); color: black; }
        .sig-sell { background: var(--red); color: white; }
        .sig-wait { background: #474d57; color: white; }

        .tabs { display: flex; gap: 4px; margin-bottom: 10px; background: #161a1e; padding: 4px; border-radius: 8px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; border-radius: 6px; cursor: pointer; color: #848e9c; }
        .tab.active { background: var(--card); color: var(--accent); font-weight: bold; }

        .chart-container { width: 100%; height: 280px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 10px; }
        
        .trade-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #848e9c; margin-bottom: 5px; }
        
        select, input { width: 100%; background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        
        .leverage-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 5px; }
        .lev-btn { background: #2b3139; border: 1px solid #474d57; color: white; padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .lev-btn.active { background: var(--accent); color: black; border-color: var(--accent); font-weight: bold; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .action { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
        .action:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-weight: bold; font-size: 14px;">TRADE GUARD <span style="color: var(--accent)">PRO</span></span>
        <span id="price-ticker" style="color: var(--accent); font-family: monospace;">---</span>
    </div>

    <div class="balance-box">
        <div style="font-size: 12px; color: #848e9c;">Доступные средства</div>
        <div class="balance-val">$<span id="bal-amount">10,000.00</span></div>
    </div>

    <!-- БЛОК СИГНАЛОВ -->
    <div class="signal-box">
        <div>
            <div style="font-size: 10px; color: #848e9c;">SMART SIGNAL (1H)</div>
            <div id="signal-text" style="font-weight: bold; font-size: 14px;">Анализ...</div>
        </div>
        <div id="signal-badge" class="signal-badge sig-wait">WAIT</div>
    </div>

    <div class="tabs">
        <div class="tab active">Торговля</div>
        <div class="tab">Портфель</div>
        <div class="tab">Анализ</div>
    </div>

    <div class="chart-container">
        <iframe id="tv-chart" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div class="trade-box">
        <div class="input-group">
            <label>Торговая пара</label>
            <select id="asset" onchange="updateMarket()">
                <option value="BTCUSDT">BTC / USDT</option>
                <option value="ETHUSDT">ETH / USDT</option>
                <option value="SOLUSDT">SOL / USDT</option>
                <option value="BNBUSDT">BNB / USDT</option>
                <option value="XRPUSDT">XRP / USDT</option>
                <option value="DOGEUSDT">DOGE / USDT</option>
                <option value="ADAUSDT">ADA / USDT</option>
                <option value="AVAXUSDT">AVAX / USDT</option>
                <option value="DOTUSDT">DOT / USDT</option>
                <option value="LINKUSDT">LINK / USDT</option>
                <option value="MATICUSDT">MATIC / USDT</option>
                <option value="SHIBUSDT">SHIB / USDT</option>
                <option value="NEARUSDT">NEAR / USDT</option>
            </select>
        </div>

        <div class="input-group">
            <label>Кредитное плечо</label>
            <div class="leverage-grid">
                <button class="lev-btn active" onclick="setLev(1, this)">x1</button>
                <button class="lev-btn" onclick="setLev(10, this)">x10</button>
                <button class="lev-btn" onclick="setLev(25, this)">x25</button>
                <button class="lev-btn" onclick="setLev(50, this)">x50</button>
                <button class="lev-btn" onclick="setLev(75, this)">x75</button>
                <button class="lev-btn" onclick="setLev(100, this)">x100</button>
                <button class="lev-btn" onclick="setLev(125, this)">x125</button>
            </div>
        </div>

        <div class="input-group">
            <label>Сумма входа (USDT)</label>
            <input type="number
" id="amount" value="100" min="10">
        </div>

        <div class="btn-group">
            <button class="action buy" onclick="trade('LONG')">LONG</button>
            <button class="action sell" onclick="trade('SHORT')">SHORT</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let currentLev = 1;

        // Обновление маркета
        function updateMarket() {
            const sym = document.getElementById('asset').value;
            document.getElementById('tv-chart').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${sym}&interval=60&theme=dark`;
            fetchPrice();
            generateSignal();
        }

        function setLev(val, el) {
            currentLev = val;
            document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        async function fetchPrice() {
            const sym = document.getElementById('asset').value;
            try {
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                const d = await r.json();
                document.getElementById('price-ticker').innerText = parseFloat(d.price).toFixed(2);
            } catch(e) {}
        }

        // Имитация сигнального движка (RSI + Random Bias для демо)
        function generateSignal() {
            const signals = ["STRONG BUY", "BUY", "WAIT", "SELL", "STRONG SELL"];
            const badges = ["sig-buy", "sig-buy", "sig-wait", "sig-sell", "sig-sell"];
            const idx = Math.floor(Math.random() * signals.length);
            
            const txt = document.getElementById('signal-text');
            const bdg = document.getElementById('signal-badge');
            
            txt.innerText = signals[idx];
            bdg.innerText = signals[idx].split(' ').pop();
            bdg.className = `signal-badge ${badges[idx]}`;
        }

        function trade(side) {
            const data = {
                action: side,
                symbol: document.getElementById('asset').value,
                amount: document.getElementById('amount').value,
                lev: currentLev
            };
            tg.sendData(JSON.stringify(data));
        }

        setInterval(fetchPrice, 3000);
        updateMarket();
    </script>
</body>
</html>

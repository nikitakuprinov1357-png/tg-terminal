<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniApp</title>
<style>
:root {
  --bg: #eef3ff;
  --card: #ffffff;
  --border: #d8e1fb;
  --text: #18233a;
  --muted: #5f6c8d;
  --accent: #1f5eff;
  --accent-dark: #1849c7;
  --danger: #d14343;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 12px;
  font-family: Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top right, #dce7ff 0, transparent 30%),
    linear-gradient(180deg, #f7f9ff 0%, var(--bg) 100%);
}
.shell {
  max-width: 760px;
  margin: 0 auto;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 10px 24px rgba(31, 94, 255, 0.08);
  margin-bottom: 12px;
}
.tab {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.tab button,
button.action {
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  padding: 10px;
  font-size: 14px;
  cursor: pointer;
}
.tab button:hover,
button.action:hover {
  background: var(--accent-dark);
}
input, select, textarea {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border: 1px solid #cfd7ef;
  border-radius: 8px;
  background: #fff;
}
textarea { resize: vertical; }
iframe {
  width: 100%;
  height: 280px;
  border-radius: 10px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
}
.hint {
  color: var(--muted);
  font-size: 13px;
  margin: 0 0 10px;
}
.status {
  min-height: 22px;
  margin-bottom: 12px;
  font-size: 14px;
  color: var(--muted);
}
.status.error {
  color: var(--danger);
}
@media (max-width: 520px) {
  .tab {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="shell">
  <div class="status" id="status">Проверьте данные перед отправкой.</div>

  <div class="tab">
    <button type="button" onclick="show('trade')">Торговля</button>
    <button type="button" onclick="show('deposit')">Депозит</button>
    <button type="button" onclick="show('withdraw')">Вывод</button>
    <button type="button" onclick="show('support')">Поддержка</button>
  </div>

  <div class="card">
    <h3>График BTC/USDT</h3>
    <p class="hint">Внешний виджет может загружаться с задержкой.</p>
    <iframe
      title="BTC/USDT chart"
      loading="lazy"
      referrerpolicy="no-referrer"
      src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_1&symbol=COINBASE:BTCUSD&interval=60&theme=light&style=1">
    </iframe>
  </div>

  <div class="card" id="trade">
    <h3>Открыть сделку</h3>
    <select id="coin">
      <option value="BTC">BTC</option>
      <option value="ETH">ETH</option>
    </select>
    <input id="amount" type="number" min="0.01" step="0.01" placeholder="Сумма" value="10">
    <input id="price" type="number" min="0.00000001" step="0.00000001" placeholder="Цена" value="1">
    <select id="direction">
      <option value="long">Long</option>
      <option value="short">Short</option>
    </select>
    <button class="action" type="button" onclick="sendTrade()">Открыть</button>
  </div>

  <div class="card" id="deposit" style="display:none;">
    <h3>Депозит</h3>
    <p class="hint">Создается заявка. Баланс пополнится только после проверки оплаты.</p>
    <input id="dep_amount" type="number" min="0.01" step="0.01" placeholder="Сумма" value="20">
    <select id="dep_method">
      <option value="crypto">Crypto</option>
      <option value="card">Карта</option>
    </select>
    <button class="action" type="button" onclick="sendDeposit()">Отправить заявку</button>
  </div>

  <div class="card" id="withdraw" style="display:none;">
    <h3>Вывод</h3>
    <p class="hint">Проверьте кошелек внимательно перед отправкой.</p>
    <input id="w_amount" type="number" min="0.01" step="0.01" placeholder="Сумма" value="10">
    <input id="w_wallet" type="text" maxlength="128" placeholder="Кошелек">
    <button class="action" type="button" onclick="sendWithdraw()">Отправить заявку</button>
  </div>

  <div class="card" id="support" style="display:none;">
    <h3>Техподдержка</h3>
    <textarea id="support_text" rows="4" maxlength="1000" placeholder="Опишите проблему"></textarea>
    <button class="action" type="button" onclick="sendSupport()">Отправить</button>
  </div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const statusEl = document.getElementById("status");

if (tg) {
  tg.expand();
  tg.ready();
  setStatus("Миниапп подключен к Telegram.");
} else {
  setStatus("Режим предпросмотра: откройте миниапп из Telegram для отправки данных.", true);
}

function setStatus(message, isError = false) {
  statusEl.textContent = message;
  statusEl.className = isError ? "status error" : "status";
}

function show(tab) {
  ["trade", "deposit", "withdraw", "support"].forEach((id) => {
    document.getElementById(id).style.display = id === tab ? "block" : "none";
  });
  setStatus("Проверьте данные перед отправкой.");
}

function readPositiveNumber(id, label) {
  const value = document.getElementById(id).value.trim();
  const number = Number(value);
  if (!Number.isFinite(number) || number <= 0) {
    throw new Error(`Поле "${label}" должно быть больше нуля.`);
  }
  return Number(number.toFixed(8));
}

function readText(id, label, maxLength) {
  const value = document.getElementById(id).value.trim();
  if (!value) {
    throw new Error(`Поле "${label}" не должно быть пустым.`);
  }
  if (value.length > maxLength) {
    throw new Error(`Поле "${label}" слишком длинное.`);
  }
  return value;
}

function sendPayload(payload, successMessage) {
  if (!tg) {
    setStatus("Отправка доступна только внутри Telegram.", true);
    return;
  }
  tg.sendData(JSON.stringify(payload));
  setStatus(successMessage);
}

function sendTrade() {
  try {
    const coin = document.getElementById("coin").value;
    const direction = document.getElementById("direction").value;

    if (!["BTC", "ETH"].includes(coin)) {
      throw new Error("Недопустимая монета.");
    }

    if (!["long", "short"].includes(direction)) {
      throw new Error("Недопустимое направление сделки.");
    }

    sendPayload({
      action: "trade",
      coin,
      amount: readPositiveNumber("amount", "Сумма"),
      price: readPositiveNumber("price", "Цена"),
      direction
    }, "Данные сделки отправлены в бот.");
  } catch (error) {
    setStatus(error.message, true);
  }
}

function sendDeposit() {
  try {
    const method = document.getElementById("dep_method").value;

    if (!["crypto", "card"].includes(method)) {
      throw new Error("Недопустимый способ пополнения.");
    }

    sendPayload({
      action: "deposit",
      amount: readPositiveNumber("dep_amount", "Сумма депозита"),
      method
    }, "Заявка на депозит отправлена.");
  } catch (error) {
    setStatus(error.message, true);
  }
}

function sendWithdraw() {
  try {
    sendPayload({
      action: "withdraw",
      amount: readPositiveNumber("w_amount", "Сумма вывода"),
      wallet: readText("w_wallet", "Кошелек", 128)
    }, "Заявка на вывод отправлена.");
  } catch (error) {
    setStatus(error.message, true);
  }
}

function sendSupport() {
  try {
    sendPayload({
      action: "support",
      message: readText("support_text", "Сообщение", 1000)
    }, "Сообщение отправлено в поддержку.");
  } catch (error) {
    setStatus(error.message, true);
  }
}
</script>
</body>
</html>

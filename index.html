<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade Guard Terminal PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #0b0e11; 
            color: #eaecef; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px;
            /* Исправлено: теперь страница листается */
            overflow-y: auto; 
            min-height: 100vh;
        }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 8px; width: 8px; background-color: #02d1a0; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #02d1a0; }
        
        .balance-card { background: #1e2329; padding: 15px; border-radius: 16px; border: 1px solid #333; }
        .balance-label { color: #848e9c; font-size: 12px; margin-bottom: 5px; }
        .balance-amount { font-size: 24px; font-weight: bold; color: #ffffff; }

        /* Уменьшили высоту графика, чтобы кнопки влезли */
        .chart-container { width: 100%; height: 250px; background: #161a1e; border-radius: 16px; overflow: hidden; border: 1px solid #2b3139; }
        
        .trade-box { background: #1e2329; padding: 15px; border-radius: 16px; border: 1px solid #333; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        
        select, input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; width: 100%; }
        
        .btn-group { display: flex; gap: 12px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-buy { background: #02d1a0; color: #000; }
        .btn-sell { background: #f6465d; color: #fff; }
        
        .price-line { font-size: 14px; color: #f0b90b; margin-bottom: 10px; font-weight: 500; text-align: center; }
        
        /* Секция позиций внутри приложения */
        .positions-title { font-size: 14px; font-weight: bold; color: #848e9c; margin-top: 10px; }
        .position-item { background: #161a1e; padding: 10px; border-radius: 8px; margin-top: 5px; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-weight: bold; color: #f0b90b;">TRADE GUARD PRO V5</span>
        <span style="font-size: 12px;"><span class="status-dot"></span> LIVE</span>
    </div>
    
    <div class="balance-card">
        <div class="balance-label">Кошелек (DEMO)</div>
        <div class="balance-amount" id="balance">10,000.00 USDT</div>
    </div>

    <div class="chart-container">
        <iframe id="widget" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=60&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
    </div>

    <div class="trade-box">
        <div class="price-line" id="price">Загрузка цены...</div>
        <div class="input-row">
            <select id="asset" onchange="updateChart()" style="width: 40%;">
                <option value="BTCUSDT">BTC/USDT</option>
                <option value="ETHUSDT">ETH/USDT</option>
                <option value="SOLUSDT">SOL/USDT</option>
            </select>
            <input type="number" id="amount" placeholder="Кол-во" style="width: 60%;">
        </div>
        <div class="btn-group">
            <button class="btn-buy" onclick="makeTrade('buy')">КУПИТЬ</button>
            <button class="btn-sell" onclick="makeTrade('sell')">ПРОДАТЬ</button>
        </div>
    </div>

    <div class="positions-title">ОТКРЫТЫЕ ПОЗИЦИИ (ВНУТРИ APP)</div>
    <div id="pos-list">
        <div class="position-item" style="color: #848e9c;">Нет активных сделок</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        
        // Развернуть на весь экран
        tg.expand();
        // Включить подтверждение закрытия (чтобы случайно не свайпнуть)
        tg.enableClosingConfirmation();

        async function getPrice() {
            const symbol = document.getElementById('asset').value;
            try {
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                const data = await response.json();
                const price = parseFloat(data.price).toFixed(2);
                document.getElementById('price').innerText = `Цена: ${price} USDT`;
            } catch (e) {
                document.getElementById('price').innerText = "Обновление цены...";
            }
        }

        function updateChart() {
            const symbol = document.getElementById('asset').value;
            document.getElementById('widget').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE%3A${symbol}&interval=60&theme=dark`;
            getPrice();
        }

        function makeTrade(type) {
            const symbol = document.getElementById('asset').value;
            const amount = document.getElementById('amount').value;

            if (!amount || amount <= 0) {
                tg.showAlert("Введите количество!");
                return;
            }

            // Показываем подтверждение
            tg.showConfirm(`Подтвердить сделку ${type.toUpperCase()} ${amount} ${symbol.replace('USDT', '')}?`, (confirm) => {
                if (confirm) {
                    // Добавляем визуально сделку в список (чтобы приложение казалось живым)
                    const list = document.getElementById('pos-list');
                    list.innerHTML = `<div class="position-item">
                        <span>${symbol.replace('USDT', '')} / ${type.toUpperCase()}</span>
                        <span style="color: #02d1a0;">ОЖИДАНИЕ...</span>
                    </div>`;
const data = {
                        action: type,
                        symbol: symbol.replace('USDT', '/USDT'),
                        amount: parseFloat(amount)
                    };
                    
                    // Сообщаем боту
                    tg.sendData(JSON.stringify(data));
                }
            });
        }

        setInterval(getPrice, 4000);
        getPrice();
    </script>
</body>
</html>

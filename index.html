<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO TERMINAL v6.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --accent: #f0b90b; --green: #02d1a0; --red: #f6465d; --text: #eaecef; --border: #2b3139; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow: hidden; }
        
        /* Вкладки */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; background: #161a1e; padding: 4px; border-radius: 8px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; border-radius: 6px; cursor: pointer; color: #848e9c; transition: 0.3s; }
        .tab.active { background: var(--card); color: var(--accent); font-weight: bold; border: 1px solid var(--border); }

        /* Контейнеры контента */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Элементы дизайна */
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .chart-container { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 10px; }
        
        select, input { width: 100%; background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 8px; margin-top: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
        .leverage-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .lev-btn { background: #2b3139; border: 1px solid #474d57; color: white; padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .lev-btn.active { background: var(--accent); color: black; border-color: var(--accent); font-weight: bold; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .action { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
        .empty-state { text-align: center; padding: 40px; color: #848e9c; font-size: 14px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('trade', this)">Торговля</div>
        <div class="tab" onclick="switchTab('orders', this)">Сделки</div>
        <div class="tab" onclick="switchTab('history', this)">История</div>
    </div>

    <!-- ВКЛАДКА: ТОРГОВЛЯ -->
    <div id="trade-content" class="tab-content active">
        <div class="chart-container">
            <iframe id="tv-chart" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
        </div>

        <div class="card">
            <label style="font-size: 11px; color: #848e9c;">Торговая пара</label>
            <select id="asset" onchange="updateChart()">
                <option value="BTCUSDT">BTC / USDT</option>
                <option value="ETHUSDT">ETH / USDT</option>
                <option value="SOLUSDT">SOL / USDT</option>
                <option value="XRPUSDT">XRP / USDT</option>
                <option value="DOGEUSDT">DOGE / USDT</option>
                <option value="BNBUSDT">BNB / USDT</option>
            </select>

            <div class="leverage-grid">
                <button class="lev-btn active" onclick="setLev(1, this)">x1</button>
                <button class="lev-btn" onclick="setLev(10, this)">x10</button>
                <button class="lev-btn" onclick="setLev(50, this)">x50</button>
                <button class="lev-btn" onclick="setLev(125, this)">x125</button>
            </div>

            <input type="number" id="amount" value="100" placeholder="Сумма USDT">

            <div class="btn-group">
                <button class="action buy" onclick="sendOrder('LONG')">LONG</button>
                <button class="action sell" onclick="sendOrder('SHORT')">SHORT</button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: СДЕЛКИ (ОТКРЫТЫЕ) -->
    <div id="orders-content" class="tab-content">
        <div class="card">
            <div class="empty-state">
                <div style="font-size: 30px; margin-bottom: 10px;">📦</div>
                У вас пока нет открытых позиций.
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА: ИСТОРИЯ -->
    <div id="history-content" class="tab-content">
        <div class="card">
            <div class="empty-state">
                <div style="font-size: 30px; margin-bottom: 10px;">📜</div>
                История ваших сделок пуста.
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let currentLev = 1;

        // Логика переключения вкладок (ТЕПЕРЬ РАБОТАЕТ)
        function switchTab(tabId, el) {
            // Убираем активный класс у всех вкладок
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            // Скрываем весь контент
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            // Активируем нужную
            el.classList.add('active');
            document.getElementById(tabId + '-content').classList.add('active');
        }

        function setLev(val, el) {
            currentLev = val;
            document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function updateChart() {
            const sym = document.getElementById('asset').value;
            document.getElementById('tv-chart').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${sym}&interv
al=60&theme=dark`;
        }

        function sendOrder(side) {
            const data = {
                action: side,
                symbol: document.getElementById('asset').value,
                amount: document.getElementById('amount').value,
                lev: currentLev
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>

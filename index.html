<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trade Guard PRO Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --accent: #f0b90b; --green: #02d1a0; --red: #f6465d; --border: #2b3139; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        .balance-box { background: var(--card); padding: 15px; border-radius: 12px; margin: 10px 0; border: 1px solid var(--border); }
        .balance-val { font-size: 22px; font-weight: bold; color: white; }

        /* Вкладки */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; background: var(--card); border-radius: 8px; padding: 5px; }
        .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; cursor: pointer; border-radius: 6px; }
        .tab.active { background: var(--border); color: var(--accent); }

        .main-content { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        @media (min-width: 600px) { .main-content { flex-direction: row; } .chart-container { flex: 2; } .trade-box { flex: 1; } }

        .chart-container { height: 350px; background: #161a1e; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .trade-box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 12px; color: #848e9c; }
        select, input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 8px; font-size: 15px; }

        .leverage-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .lev-btn { background: #2b3139; border: 1px solid #474d57; color: white; padding: 5px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .lev-btn.active { border-color: var(--accent); color: var(--accent); }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button.action { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }

        #pos-list { margin-top: 10px; }
        .pos-card { background: var(--card); padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid var(--green); font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <span style="color: var(--accent); font-weight: bold;">PRO TERMINAL v5.5</span>
        <span id="user-id" style="font-size: 11px; color: #848e9c;"></span>
    </div>

    <div class="balance-box">
        <div style="font-size: 12px; color: #848e9c;">Доступный баланс</div>
        <div class="balance-val">10,000.00 USDT</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('trade')">Трейдинг</div>
        <div class="tab" onclick="switchTab('orders')">Сделки</div>
        <div class="tab" onclick="switchTab('history')">История</div>
    </div>

    <div id="trade-section" class="main-content">
        <div class="chart-container">
            <iframe id="widget" src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=60&theme=dark" width="100%" height="100%" frameborder="0"></iframe>
        </div>

        <div class="trade-box">
            <div class="input-group">
                <label>Инструмент</label>
                <select id="asset" onchange="updateChart()">
                    <option value="BTCUSDT">BTC/USDT</option>
                    <option value="ETHUSDT">ETH/USDT</option>
                    <option value="SOLUSDT">SOL/USDT</option>
                    <option value="BNBUSDT">BNB/USDT</option>
                </select>
            </div>

            <div class="input-group">
                <label>Кредитное плечо</label>
                <div class="leverage-grid">
                    <button class="lev-btn active" onclick="setLev(1, this)">x1</button>
                    <button class="lev-btn" onclick="setLev(10, this)">x10</button>
                    <button class="lev-btn" onclick="setLev(50, this)">x50</button>
                    <button class="lev-btn" onclick="setLev(100, this)">x100</button>
                </div>
            </div>

            <div class="input-group">
                <label>Количество (USDT)</label>
                <input type="number" id="amount" placeholder="0.00" value="100">
            </div>

            <div class="btn-group">
                <button class="action buy" onclick="processTrade('buy')">LONG</button>
                <button class="action sell" onclick="processTrade('sell')">SHORT</button>
            </div>
        </div>
    </div>

    <div id="orders-section" style="display:none; padding-bottom: 50px;">
        <div id="pos-list">
            <div style="text-align: center; padding: 20px; color: #848e9c;">Нет активных позиций</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let currentLeverage = 1;
        document.getElementById('user-id').innerText = `ID: ${tg.initDataUnsafe.user?.id || 'Demo'}`;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('trade-section').style.display = tab === 'trade' ? 'flex' : 'none';
            document.getElementById('orders-section').style.display =
tab === 'orders' ? 'block' : 'none';
        }

        function setLev(val, el) {
            currentLeverage = val;
            document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function updateChart() {
            const sym = document.getElementById('asset').value;
            document.getElementById('widget').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE%3A${sym}&interval=60&theme=dark`;
        }

        function processTrade(side) {
            const amount = document.getElementById('amount').value;
            const asset = document.getElementById('asset').value;
            
            if(!amount || amount <= 0) { tg.showAlert("Введите сумму!"); return; }

            tg.showConfirm(`Открыть ${side.toUpperCase()} на ${amount} USDT с плечом x${currentLeverage}?`, (ok) => {
                if(ok) {
                    const data = {
                        action: side,
                        symbol: asset.replace('USDT', '/USDT'),
                        amount: parseFloat(amount),
                        leverage: currentLeverage,
                        type: 'market'
                    };
                    tg.sendData(JSON.stringify(data));
                }
            });
        }
    </script>
</body>
</html>
